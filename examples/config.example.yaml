# Skills Manager 配置示例
# Skills Manager Configuration Example

# 工作空间目录（所有技能存储在此）
# Workspace directory where all skills are stored
workspace: ~/.skills/workspace

# ClawHub 配置（可选，用于从 ClawHub 安装 skills）
# ClawHub configuration (optional, for installing skills from ClawHub)
clawhub:
  # API Token - 访问 https://clawhub.ai 获取
  # API Token - Visit https://clawhub.ai to get one
  token: your-api-token-here

  # Registry URL (通常不需要修改)
  # Registry URL (usually no need to modify)
  registry: https://clawhub.ai/api/v1

# AI 工具配置
# AI tools configuration
tools:
  # 示例 1: Claude Code
  # Example 1: Claude Code
  claude-code:
    name: claude-code
    path: ~/.claude/skills
    enabled: true

  # 示例 2: OpenClaw
  # Example 2: OpenClaw
  openclaw:
    name: openclaw
    path: ~/.openclaw/skills
    enabled: true

  # 示例 3: ZeroClaw
  # Example 3: ZeroClaw
  zeroclaw:
    name: zeroclaw
    path: ~/.zeroclaw/skills
    enabled: true

  # 示例 4: 自定义工具
  # Example 4: Custom Tool
  # 你可以添加任何支持技能目录的 AI 工具
  # You can add any AI tool that supports skills directory
  my-custom-tool:
    name: my-custom-tool
    path: ~/.my-custom-tool/skills
    enabled: true

  # 示例 5: NPX Skills
  # Example 5: NPX Skills
  npx-skills:
    name: npx-skills
    path: ~/.agents/skills
    enabled: false

# 配置说明 / Configuration Notes:
#
# name: 工具的唯一标识符 (必需)
#        Unique identifier for the tool (required)
#
# path: 工具的技能目录路径 (必需)
#        Path to the tool's skills directory (required)
#
# enabled: 是否启用该工具 (可选, 默认: true)
#          Whether the tool is enabled (optional, default: true)
